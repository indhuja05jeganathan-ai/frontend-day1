<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *body {
            background-color: rgb(218, 218, 93);
           
        }

        .s1 {
            color: rgb(190, 21, 21);
            background-color: rgb(19, 9, 9);
            border: 2px solid rgb(26, 19, 19);
            padding: 10px 25px 10px 25px;
            border-radius: 20px;
             margin-bottom: 20px;
        }

        .s2 {
            color: blue;
            background-color: aqua;
            border: 2px solid aqua;
            padding: 10px 25px 10px 25px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .s3 {
            color: brown;
            background-color: darkseagreen;
            border: 2px solid darkseagreen;
            padding: 10px 20px 10px 20px;
            border-radius: 100px;
            margin-bottom: 20px;

        }

        .s4 {
             
                width: 100px;
                height: 100px;
                border-radius: 100px;
                background: #4CAF50;
                color: white;
                border: none;
                font-size: 20px;
                cursor: pointer;
                margin-bottom: 20px;
            }


        

        .s5 {
            color: darkblue;
            background-color: aquamarine;
            border: 2px solid darkseagreen;
            padding: 5px 30px 5px 30px; 
            border-radius: 200px;
            border: none;

        }
    </style>

</head>

<body>
    <button class="s1">Submit</button><br>
    <button class="s2">Submit</button><br>
    <button class="s3">Submit</button><br>
    <button class="s4">Submit</button><br>
    <button class="s5">Submit</button>
</body>

</html>
